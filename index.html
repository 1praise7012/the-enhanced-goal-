<!DOCTYPE html>
<html>
<head>
  <title>A New Dawn</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="warning-screen">
  <h1>⚠️ WARNING ⚠️</h1>

  <p>
    This game contains emotional themes,
    grief, strong language, and mature topics.
  </p>

  <button onclick="startGame()">
    Start Game
  </button>
</div>

<div id="game-screen" style="display:none;">

  <img id="background" src="assets/images/room.jpg">

  <div id="characters"></div>

  <div id="dialogue-box">
    <h2 id="speaker">Narrator</h2>
    <p id="text">
      Welcome...
    </p>

    <div id="choices"></div>

    <button onclick="nextScene()">
      Continue
    </button>
  </div>

</div>

<script src="story.js"></script>
<script src="game.js"></script>

</body>
</html>
